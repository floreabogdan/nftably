name: Bug report
description: Something in nftably behaves incorrectly.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. nftably is beta software — please include the versions and
        `nftably doctor` output below; they save a round-trip. **Do not report security issues
        here** — see [SECURITY.md](https://github.com/floreabogdan/nftably/blob/main/SECURITY.md).
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what happened instead?
      placeholder: Steps to reproduce, and the difference between expected and actual behaviour.
    validations:
      required: true
  - type: input
    id: nftably-version
    attributes:
      label: nftably version
      description: Output of `nftably version`.
      placeholder: "nftably v0.2.0"
    validations:
      required: true
  - type: input
    id: nft-version
    attributes:
      label: nft version
      description: Output of `nft --version`, and your Linux distribution.
      placeholder: "nftables v1.0.9 (Old Doc Yak) — Debian 12"
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: "`nftably doctor` output"
      description: Run `nftably doctor` as the user nftably runs as, and paste the output.
      render: text
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Any relevant lines from nftably's log (`journalctl -u nftably`). Redact addresses if you prefer.
      render: text
