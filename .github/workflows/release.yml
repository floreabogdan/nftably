name: Release

# Cut a release by pushing a tag:  git tag v0.2.0 && git push origin v0.2.0
on:
  push:
    tags: ["v*"]

jobs:
  binaries:
    name: Build binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release and upload assets
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"
          check-latest: true

      - name: Cross-compile
        env:
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          mkdir -p dist
          LDFLAGS="-s -w -X github.com/floreabogdan/nftably/internal/buildinfo.Version=${VERSION} -X github.com/floreabogdan/nftably/internal/buildinfo.Commit=${COMMIT}"
          targets="linux/amd64 linux/arm64 linux/arm"
          for t in $targets; do
            export GOOS=${t%/*} GOARCH=${t#*/} CGO_ENABLED=0
            echo "building $GOOS/$GOARCH"
            go build -trimpath -ldflags="$LDFLAGS" -o nftably ./cmd/nftably
            tar -czf "dist/nftably_${VERSION}_${GOOS}_${GOARCH}.tar.gz" nftably LICENSE README.md
            rm -f nftably
          done
          ls -la dist

      - name: Build Linux packages (.deb/.rpm/.apk)
        env:
          VERSION: ${{ github.ref_name }}
          NFPM_VERSION: "2.47.0"
        run: |
          # Prebuilt binary, not `go install` — the latest nfpm requires a newer
          # Go toolchain than this job's, and GOTOOLCHAIN=local blocks the upgrade.
          curl -sSfL "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_Linux_x86_64.tar.gz" \
            | tar -xz -C /tmp nfpm
          NFPM="/tmp/nfpm" sh deploy/build-packages.sh "$VERSION"
          ( cd dist && sha256sum *.tar.gz *.deb *.rpm *.apk > SHA256SUMS.txt )
          ls -la dist

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true

  image:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to ghcr.io
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-qemu-action@v4 # arm64 via emulation
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
