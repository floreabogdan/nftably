<!doctype html>
<html>
<head>
	<title>nftably — login</title>
	{{template "head" .}}
</head>
<body>
<div class="login-wrap">
	<div class="card login-card">
		<div class="card-body">
			<span class="brand">nftably</span>
			<div class="login-sub">nftables manager</div>
			{{if eq .Error "locked"}}<div class="error-text">Too many failed attempts. Try again in a few minutes.</div>
			{{else if .Error}}<div class="error-text">Invalid username or password.</div>{{end}}
			<form method="post" action="/login">
				<div class="field">
					<label for="username">Username</label>
					<input type="text" id="username" name="username" autocomplete="username" autofocus required>
				</div>
				<div class="field">
					<label for="password">Password</label>
					<input type="password" id="password" name="password" autocomplete="current-password" required>
				</div>
				<button type="submit" class="btn btn-primary btn-block">Sign in</button>
			</form>
		</div>
	</div>
</div>
</body>
</html>
